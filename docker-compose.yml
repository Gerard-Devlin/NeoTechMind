services:
  db:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neotechmind}
      POSTGRES_USER: ${POSTGRES_USER:-neotechmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neotechmind} -d ${POSTGRES_DB:-neotechmind}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neotechmind}:${POSTGRES_PASSWORD:-change_me_db_password}@db:5432/${POSTGRES_DB:-neotechmind}
      DATABASE_SSL: disable
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_admin_password}
      HOST: 0.0.0.0
      PORT: 4321
      NODE_ENV: production
    ports:
      - "${APP_PORT:-80}:4321"

volumes:
  pg_data:
